services:
  - type: web
    name: ai-scholar-api
    runtime: python
    pythonVersion: "3.11.11"
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: EMBEDDING_PROVIDER
        value: local

      - key: CORS_ORIGINS
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_SECRET_KEY
        sync: false

      - key: GROQ_API_KEY
        sync: false
